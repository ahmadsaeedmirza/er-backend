name: Deploy to Railway

on:
  push:
    branches:
      - master # Change to your deployment branch if not master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: master
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway Workspace
        run: |
          if [ -z "$RAILWAY_API_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is empty! Please check your GitHub repository secrets."
            exit 1
          fi
          railway up --detach --project ${{ secrets.RAILWAY_PROJECT_ID }} --environment production --service ${{ secrets.RAILWAY_SERVICE_NAME || 'er-backend' }}
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
